<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Save to Savers</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="head">
        <div class="brand">Savers</div>
        <div id="status" class="status small muted"></div>
      </header>

      <form id="form" class="form">
        <label class="field">
          <span class="label">URL</span>
          <input id="url" readonly />
        </label>

        <label class="field">
          <span class="label">Title</span>
          <input id="title" />
        </label>

        <label class="field">
          <span class="label">Notes</span>
          <textarea id="notes" rows="3"></textarea>
        </label>

        <div class="field">
          <div class="label tags-label">
            <span>Tags <span class="small muted">(comma separated)</span></span>
            <button type="button" id="suggestTags" class="suggest-btn">Suggest</button>
          </div>
          <div id="tagProposals" class="tag-proposals" hidden></div>
          <input id="tags" placeholder="design, inspiration" />
        </div>

        <label class="field">
          <span class="label">Collection</span>
          <select id="collection">
            <option value="">Unsorted</option>
          </select>
        </label>

        <div class="actions">
          <button type="button" id="cancel" class="btn">Cancel</button>
          <button type="submit" id="save" class="btn btn-primary">Save</button>
        </div>
      </form>

      <div id="result" class="result small muted" hidden></div>

      <details class="settings">
        <summary>Connection</summary>
        <label class="field">
          <span class="label">Savers app URL</span>
          <input id="apiBase" placeholder="https://savers-production.up.railway.app" />
        </label>
        <p class="small muted">
          Sign in on that Savers site in Chrome first. This extension will reuse that session.
        </p>
      </details>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
