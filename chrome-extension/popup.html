<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Savers Quick Add</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel">
        <label class="field">
          <span class="label">Title</span>
          <input id="bookmark-title" type="text" />
        </label>

        <div class="field">
          <span class="label">Tags</span>
          <input id="bookmark-tags" type="text" placeholder="design, inspiration" />
          <div class="inline-actions tag-actions">
            <button id="suggest-tags" class="pill-btn pill-btn-primary" type="button">Suggest tags</button>
          </div>
          <div id="tag-proposals" class="tag-proposals hidden"></div>
        </div>

        <div class="field">
          <span class="label">Collection</span>
          <select id="collection-select" class="hidden"></select>
          <button id="collection-trigger" class="picker-trigger" type="button" aria-expanded="false">
            <span id="collection-trigger-label">Unsorted</span>
            <span class="picker-chevron" aria-hidden="true">⌄</span>
          </button>
          <div id="collection-picker" class="picker hidden">
            <input id="collection-search" type="text" placeholder="Find a collection" />
            <div id="collection-options" class="picker-options"></div>
          </div>
          <div class="inline-actions">
            <button id="suggest-collection" class="pill-btn pill-btn-primary hidden" type="button">
              Suggest collection
            </button>
          </div>
        </div>

        <div id="ai-suggestion" class="ai-suggestion hidden">
          <div class="label ai-suggestion-label">Suggested collection</div>
          <div id="ai-suggestion-copy" class="ai-suggestion-copy"></div>
          <div class="inline-actions ai-actions">
            <button id="apply-ai-suggestion" class="pill-btn pill-btn-primary" type="button">
              Use suggestion
            </button>
            <button id="dismiss-ai-suggestion" class="pill-btn" type="button">
              Dismiss
            </button>
          </div>
        </div>

        <p id="ai-status" class="status ai-status" role="status"></p>

        <label class="field">
          <span class="label">Description</span>
          <textarea id="bookmark-description" rows="3"></textarea>
        </label>

        <div class="inline-actions">
          <button id="show-create" class="pill-btn" type="button">
            + New collection
          </button>
          <button id="refresh-meta" class="pill-btn" type="button">
            Refresh metadata
          </button>
        </div>

        <div id="create-wrap" class="create-wrap hidden">
          <label class="field">
            <span class="label">New collection name</span>
            <input id="new-collection-name" type="text" placeholder="Collection name" />
          </label>
          <div class="inline-actions">
            <button id="create-collection" class="pill-btn pill-btn-primary" type="button">
              Create
            </button>
            <button id="cancel-create" class="pill-btn" type="button">
              Cancel
            </button>
          </div>
        </div>

        <p id="status" class="status" role="status"></p>

        <div id="duplicate-warning" class="duplicate-warning hidden">
          <div class="duplicate-copy">
            Already saved as <span id="duplicate-title"></span>.
          </div>
          <div class="inline-actions duplicate-actions">
            <button id="open-duplicate" class="pill-btn" type="button">
              Open in app
            </button>
            <button id="save-anyway" class="pill-btn" type="button">
              Save anyway
            </button>
          </div>
        </div>

        <div id="unsynced-badge" class="unsynced-badge hidden">
          <span id="unsynced-count" class="unsynced-count">0</span> unsaved pages — will retry
        </div>

        <div class="foot">
          <button id="open-app" class="btn btn-secondary" type="button">Open app</button>
          <button id="save-bookmark" class="btn btn-primary" type="button">Save</button>
        </div>
      </section>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
